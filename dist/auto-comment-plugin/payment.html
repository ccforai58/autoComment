<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>购买 CSV - Auto Register Filler</title>
    <style>
      * { box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 24px;
        background: #f5f5f7;
        color: #1f2937;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        color: #111827;
      }

      .subtitle {
        font-size: 13px;
        color: #6b7280;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 9px 16px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
      }

      .btn-primary {
        background: #1677ff;
        color: #fff;
        box-shadow: 0 8px 18px rgba(22, 119, 255, 0.22);
      }

      .btn-primary:hover {
        transform: translateY(-0.5px);
        box-shadow: 0 10px 24px rgba(22, 119, 255, 0.3);
      }

      .btn-secondary {
        background: #fff;
        color: #374151;
        border: 1px solid #e5e7eb;
      }

      .btn-danger {
        background: #fff;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }

      .btn-danger:hover {
        background: #fef2f2;
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.62;
        transform: none;
        box-shadow: none;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr);
        gap: 16px;
        align-items: start;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .panel {
        padding: 18px 20px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .section-title {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
        color: #374151;
      }

      .batch-list,
      .orders-list {
        display: grid;
        gap: 10px;
      }

      .batch-item,
      .order-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fff;
      }

      .batch-item {
        cursor: pointer;
      }

      .batch-item:hover {
        border-color: #93c5fd;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      }

      .batch-item.selected {
        border-color: #1677ff;
        box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.14);
      }

      .item-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        min-width: 0;
        font-size: 14px;
        font-weight: 800;
        color: #111827;
      }

      .file-name {
        overflow-wrap: anywhere;
      }

      .status-pill {
        flex: 0 0 auto;
        padding: 3px 8px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 12px;
        font-weight: 800;
      }

      .status-pill.purchased {
        background: #ecfdf5;
        color: #047857;
      }

      .status-pill.disabled {
        background: #f3f4f6;
        color: #6b7280;
      }

      .item-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
        color: #6b7280;
        font-size: 12px;
      }

      .item-meta strong {
        color: #374151;
      }

      .checkout-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid #f3f4f6;
        font-size: 13px;
      }

      .checkout-row:last-child {
        border-bottom: none;
      }

      .checkout-label {
        color: #6b7280;
      }

      .checkout-value {
        font-weight: 800;
        color: #111827;
        text-align: right;
        overflow-wrap: anywhere;
      }

      .pay-box {
        margin-top: 14px;
        padding: 16px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px dashed #bfdbfe;
        text-align: center;
      }

      .alipay-mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 10px;
        border-radius: 14px;
        background: #1677ff;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 900;
      }

      .pay-status {
        min-height: 34px;
        margin-top: 10px;
        font-size: 12px;
        color: #6b7280;
        line-height: 1.45;
      }

      .orders-panel {
        margin-top: 16px;
      }

      .order-actions,
      .batch-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .empty-state {
        padding: 14px 12px;
        border: 1px dashed #d1d5db;
        border-radius: 8px;
        color: #6b7280;
        font-size: 13px;
        text-align: center;
      }

      @media (max-width: 760px) {
        body { padding: 16px; }
        .topbar { align-items: flex-start; flex-direction: column; }
        .layout { grid-template-columns: 1fr; }
        .batch-item, .order-item { grid-template-columns: 1fr; }
        .batch-actions, .order-actions { justify-content: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h1>购买 CSV</h1>
          <div class="subtitle">按数据日期范围选择博客列表 CSV</div>
        </div>
        <button id="backBtn" class="btn btn-secondary">返回设置</button>
      </div>

      <div class="layout">
        <div class="card panel">
          <div class="section-head">
            <div class="section-title">CSV 文件</div>
            <button id="refreshBatchesBtn" class="btn btn-secondary">刷新</button>
          </div>
          <div class="batch-list" id="batchList">
            <div class="empty-state">正在读取 CSV 列表...</div>
          </div>
        </div>

        <div class="card panel">
          <div class="section-title">订单确认</div>
          <div class="checkout-row">
            <span class="checkout-label">当前账户</span>
            <span class="checkout-value" id="userIdText">未设置</span>
          </div>
          <div class="checkout-row">
            <span class="checkout-label">CSV 文件</span>
            <span class="checkout-value" id="selectedFileText">未选择</span>
          </div>
          <div class="checkout-row">
            <span class="checkout-label">数据范围</span>
            <span class="checkout-value" id="selectedRangeText">-</span>
          </div>
          <div class="checkout-row">
            <span class="checkout-label">应付金额</span>
            <span class="checkout-value" id="priceText">-</span>
          </div>

          <div class="pay-box">
            <div class="alipay-mark">支</div>
            <button id="payBtn" class="btn btn-primary" style="width: 100%;">支付宝支付</button>
            <div class="pay-status" id="payStatus">请选择一个 CSV 文件。</div>
          </div>
        </div>
      </div>

      <div class="card panel orders-panel">
        <div class="section-head">
          <div class="section-title">待支付订单</div>
          <button id="refreshOrdersBtn" class="btn btn-secondary">刷新订单</button>
        </div>
        <div class="orders-list" id="pendingOrdersList">
          <div class="empty-state">正在读取待支付订单...</div>
        </div>
      </div>
    </div>

    <script src="extension-config.js"></script>
    <script src="payment.js"></script>
  </body>
</html>
